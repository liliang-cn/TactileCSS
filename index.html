<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tactile CSS - Demo</title>
  <link rel="stylesheet" href="dist/tactile.css">
  <style>
    * { box-sizing: border-box; }
    .container { max-width: 1000px; margin: 0 auto; padding: 2rem 2rem 100px; }
    .section { margin-bottom: 3rem; }
    .title {
      font-size: 1.125rem;
      font-weight: 700;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid rgba(128,128,128,0.15);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }
    header {
      text-align: center;
      margin-bottom: 3rem;
      padding-top: 1rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
    }
    header p { opacity: 0.5; margin-bottom: 1.5rem; }

    .demo-box {
      width: 90px;
      height: 90px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.875rem;
    }
    .demo-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    .demo-card {
      padding: 1.5rem;
      border-radius: 18px;
      flex: 1;
      min-width: 180px;
    }
    .demo-card h3 { margin: 0 0 0.25rem 0; font-size: 1rem; }
    .demo-card p { margin: 0; font-size: 0.8125rem; opacity: 0.5; }
    .demo-btn {
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      font-size: 0.875rem;
      font-weight: 600;
    }
    svg { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .theme-switcher {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .theme-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .theme-btn:hover { transform: translateY(-1px); }
    .theme-btn.active {
      background: var(--tactile-primary);
      color: white;
    }
  </style>
</head>
<body class="tactile">
  <div class="container">
    <header>
      <h1>Tactile CSS</h1>
      <p>Neumorphic UI with physical material themes</p>
      <div class="theme-switcher">
        <button class="theme-btn active" data-theme="">Classic</button>
        <button class="theme-btn" data-theme="mono">Mono</button>
        <button class="theme-btn" data-theme="iron">Iron</button>
        <button class="theme-btn" data-theme="paper">Paper</button>
        <button class="theme-btn" data-theme="terminal">Terminal</button>
        <button class="theme-btn" data-theme="warm">Warm</button>
      </div>
    </header>

    <!-- Shadows -->
    <section class="section">
      <h2 class="title">Shadows</h2>
      <div class="row">
        <div class="demo-box tactile-outer">Outer</div>
        <div class="demo-box tactile-outer tactile-sm">Small</div>
        <div class="demo-box tactile-outer tactile-lg">Large</div>
        <div class="demo-box tactile-inner">Inner</div>
        <div class="demo-box tactile-inner tactile-sm">Small</div>
      </div>
    </section>

    <!-- Buttons -->
    <section class="section">
      <h2 class="title">Buttons</h2>
      <div class="row">
        <button class="demo-btn tactile-button">Default</button>
        <button class="demo-btn tactile-button-primary">Primary</button>
        <button class="demo-btn tactile-button tactile-sm">Small</button>
        <button class="demo-btn tactile-button tactile-lg">Large</button>
        <button class="demo-circle tactile-button">+</button>
      </div>
    </section>

    <!-- Input -->
    <section class="section">
      <h2 class="title">Input</h2>
      <div class="row">
        <input type="text" class="tactile-input" placeholder="Search..." style="max-width: 280px;">
      </div>
    </section>

    <!-- Segmented -->
    <section class="section">
      <h2 class="title">Segmented Control</h2>
      <div class="row">
        <div class="tactile-segmented tactile-inner">
          <button class="tactile-segment">Day</button>
          <button class="tactile-segment tactile-active">Week</button>
          <button class="tactile-segment">Month</button>
        </div>
      </div>
    </section>

    <!-- Keypad -->
    <section class="section">
      <h2 class="title">Keypad</h2>
      <div class="row">
        <div class="tactile-keypad tactile-inner" style="width: 240px;">
          <button class="tactile-key">1</button>
          <button class="tactile-key">2</button>
          <button class="tactile-key">3</button>
          <button class="tactile-key">4</button>
          <button class="tactile-key">5</button>
          <button class="tactile-key">6</button>
          <button class="tactile-key">7</button>
          <button class="tactile-key">8</button>
          <button class="tactile-key">9</button>
          <button class="tactile-key">.</button>
          <button class="tactile-key">0</button>
          <button class="tactile-key tactile-key-action">→</button>
        </div>
      </div>
    </section>

    <!-- Gauge -->
    <section class="section">
      <h2 class="title">Radial Gauge</h2>
      <div class="row" style="gap: 1.5rem;">
        <div class="tactile-gauge tactile-inner" style="--progress: 30%;">
          <div class="tactile-gauge-center">
            <span class="tactile-gauge-value">30%</span>
          </div>
        </div>
        <div class="tactile-gauge tactile-inner" style="--progress: 70%;">
          <div class="tactile-gauge-center">
            <span class="tactile-gauge-value">70%</span>
          </div>
        </div>
        <div class="tactile-gauge tactile-inner" style="--progress: 100%;">
          <div class="tactile-gauge-center">
            <span class="tactile-gauge-value">100%</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Progress -->
    <section class="section">
      <h2 class="title">Progress</h2>
      <div style="max-width: 350px;">
        <div class="tactile-track tactile-inner" style="margin-bottom: 0.75rem;">
          <div class="tactile-track-fill" style="width: 40%;"></div>
        </div>
        <div class="tactile-track tactile-inner">
          <div class="tactile-track-fill" style="width: 75%;"></div>
        </div>
      </div>
    </section>

    <!-- Slider -->
    <section class="section">
      <h2 class="title">Slider</h2>
      <div style="max-width: 350px;">
        <div class="tactile-slider">
          <div class="tactile-slider-track tactile-inner"></div>
          <div class="tactile-slider-thumb tactile-outer" style="left: 35%;"></div>
        </div>
      </div>
    </section>

    <!-- FAB -->
    <section class="section">
      <h2 class="title">FAB</h2>
      <div class="row" style="gap: 1.5rem;">
        <button class="tactile-fab tactile-fab-sm">+</button>
        <button class="tactile-fab">+</button>
        <button class="tactile-fab tactile-fab-lg">+</button>
      </div>
    </section>

    <!-- Cards -->
    <section class="section">
      <h2 class="title">Cards</h2>
      <div class="row" style="align-items: stretch;">
        <div class="demo-card tactile-outer">
          <h3>Raised</h3>
          <p>Outer shadow</p>
        </div>
        <div class="demo-card tactile-inner">
          <h3>Inset</h3>
          <p>Inner shadow</p>
        </div>
      </div>
    </section>

    <!-- Colors -->
    <section class="section">
      <h2 class="title">Colors</h2>
      <div class="row">
        <div class="demo-box tactile-outer tactile-primary">Primary</div>
        <div class="demo-box tactile-outer tactile-success">Success</div>
        <div class="demo-box tactile-outer tactile-danger">Danger</div>
        <div class="demo-box tactile-outer tactile-warning">Warning</div>
      </div>
    </section>

  </div>

  <button class="tactile-fab" style="position: fixed; bottom: 24px; right: 24px;">+</button>

  <script>
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.documentElement.setAttribute('data-theme', btn.dataset.theme);
      });
    });

    document.querySelectorAll('.tactile-segmented').forEach(ctrl => {
      ctrl.querySelectorAll('.tactile-segment').forEach(btn => {
        btn.addEventListener('click', () => {
          ctrl.querySelectorAll('.tactile-segment').forEach(b => b.classList.remove('tactile-active'));
          btn.classList.add('tactile-active');
        });
      });
    });
  </script>
</body>
</html>
